<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Aero Glass — ComTek Atomic Clock theme (Win11 Fluent acrylic)</title>
  <defs>
    <linearGradient id="bg-ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a4f7a"/>
      <stop offset="50%" stop-color="#5d7ba8"/>
      <stop offset="100%" stop-color="#243a5e"/>
    </linearGradient>
    <linearGradient id="acrylic-ag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.32)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.14)"/>
    </linearGradient>
    <filter id="shadow-ag">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- mock desktop wallpaper showing through -->
  <rect width="400" height="400" fill="url(#bg-ag)"/>
  <!-- subtle wallpaper detail to make the translucency read -->
  <g opacity="0.15">
    <circle cx="80" cy="80" r="40" fill="#fff"/>
    <circle cx="340" cy="120" r="20" fill="#fff"/>
    <circle cx="60" cy="320" r="60" fill="#000"/>
  </g>
  <g transform="translate(200,200)" filter="url(#shadow-ag)">
    <!-- acrylic disc -->
    <circle r="172" fill="url(#acrylic-ag)"/>
    <circle r="172" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1"/>
    <circle r="160" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <!-- 12 hour ticks (white, semi-transparent) -->
    <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(0)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(30)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(60)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(90)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(120)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(150)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(180)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(210)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(240)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(270)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(300)"/>
      <line x1="0" y1="-156" x2="0" y2="-142" transform="rotate(330)"/>
    </g>
    <!-- numerals at 12/3/6/9 -->
    <g font-family="'Segoe UI Variable', 'Segoe UI', sans-serif" font-weight="600" font-size="22" fill="#ffffff" text-anchor="middle">
      <text y="-118">12</text>
      <text x="118" y="8">3</text>
      <text y="128">6</text>
      <text x="-118" y="8">9</text>
    </g>
    <!-- hour hand: white rounded baton -->
    <line x1="0" y1="14" x2="0" y2="-92" stroke="#ffffff" stroke-width="7" stroke-linecap="round" transform="rotate(304.35)"/>
    <!-- minute hand: white rounded baton, longer -->
    <line x1="0" y1="18" x2="0" y2="-128" stroke="#ffffff" stroke-width="5" stroke-linecap="round" transform="rotate(52.2)"/>
    <!-- second hand: cyan accent -->
    <line x1="0" y1="22" x2="0" y2="-140" stroke="#00b7ff" stroke-width="2" stroke-linecap="round" transform="rotate(252)"/>
    <!-- center pin -->
    <circle r="6" fill="#ffffff"/>
    <circle r="2" fill="#00b7ff"/>
    <!-- digital readout: translucent pill below center -->
    <rect x="-58" y="50" width="116" height="28" rx="14" fill="rgba(0,0,0,0.35)"/>
    <text x="0" y="69" text-anchor="middle" font-family="'Segoe UI Variable', 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#ffffff" letter-spacing="1.5">10:08:42</text>
  </g>
</svg>

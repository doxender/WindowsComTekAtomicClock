      <line x1="0" y1="-160" x2="0" y2="-138" transform="rotate(330)"/>
    </g>
    <!-- hour hand: solid black baton -->
    <rect x="-5" y="-100" width="10" height="125" fill="#0a0a0a" transform="rotate(304.35)"/>
    <!-- minute hand: longer thinner black baton -->
    <rect x="-3.5" y="-138" width="7" height="160" fill="#0a0a0a" transform="rotate(52.2)"/>
    <!-- second hand: red rod with red disc at the tip (SBB stop signal) -->
    <g transform="rotate(252)">
      <line x1="0" y1="22" x2="0" y2="-118" stroke="#e3001b" stroke-width="2.5" stroke-linecap="butt"/>
      <circle cx="0" cy="-128" r="14" fill="#e3001b"/>
    </g>
    <!-- center pin -->
    <circle r="5" fill="#0a0a0a"/>
    <!-- minimal digital readout below center -->
    <text x="0" y="80" text-anchor="middle" font-family="'Helvetica Neue', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="500" fill="#0a0a0a" letter-spacing="2">10 : 08 : 42</text>
  </g>

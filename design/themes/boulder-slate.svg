    <!-- 12 hour markers (thicker, longer) -->
    <g stroke="#0a0a0a" stroke-width="6" stroke-linecap="butt">
      <line x1="0" y1="-160" x2="0" y2="-138" transform="rotate(0)"/>
      <line x1="0" y1="-160" x2="0" y2="-138" transform="rotate(30)"/>
      <line x1="0" y1="-160" x2="0" y2="-138" transform="rotate(60)"/>
      <line x1="0" y1="-160" x2="0" y2="-138" transform="rotate(90)"/>
      <line x1="0" y1="-160" x2="0" y2="-138" transform="rotate(120)"/>
      <line x1="0" y1="-160" x2="0" y2="-138" transform="rotate(150)"/>
      <line x1="0" y1="-160" x2="0" y2="-138" transform="rotate(180)"/>
      <line x1="0" y1="-160" x2="0" y2="-138" transform="rotate(210)"/>
      <line x1="0" y1="-160" x2="0" y2="-138" transform="rotate(240)"/>

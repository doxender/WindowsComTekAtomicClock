      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(126)"/>
      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(132)"/>
      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(138)"/>
      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(144)"/>
      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(156)"/>
      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(162)"/>
      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(168)"/>

      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(204)"/>
      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(216)"/>
      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(222)"/>
      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(228)"/>
      <line x1="0" y1="-160" x2="0" y2="-152" transform="rotate(234)"/>

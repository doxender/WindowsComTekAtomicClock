      <text x="58" y="-94">1</text>
      <text x="100" y="-52">2</text>
      <text x="118" y="10">3</text>
      <text x="100" y="70">4</text>
      <text x="58" y="112">5</text>
      <text y="128">6</text>
      <text x="-58" y="112">7</text>
      <text x="-100" y="70">8</text>
      <text x="-118" y="10">9</text>
      <text x="-100" y="-52">10</text>
      <text x="-58" y="-94">11</text>
    </g>
    <!-- hour hand: thick navy -->
    <rect x="-4.5" y="-90" width="9" height="110" fill="#003366" rx="1.5" transform="rotate(304.35)"/>
    <!-- minute hand: longer navy -->
    <rect x="-3.5" y="-128" width="7" height="148" fill="#003366" rx="1.5" transform="rotate(52.2)"/>
    <!-- second hand: orange-red for high contrast -->
    <line x1="0" y1="22" x2="0" y2="-140" stroke="#e84a1a" stroke-width="2" stroke-linecap="round" transform="rotate(252)"/>
    <!-- center pin -->
    <circle r="6" fill="#003366"/>
    <circle r="2" fill="#e84a1a"/>
    <!-- digital readout -->
    <text x="0" y="74" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#003366" letter-spacing="2">10:08:42</text>
  </g>

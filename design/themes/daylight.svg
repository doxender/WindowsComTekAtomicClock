    <!-- 12 hour ticks (navy, thicker) -->
    <g stroke="#003366" stroke-width="3.5" stroke-linecap="square">
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(0)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(30)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(60)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(90)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(120)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(150)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(180)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(210)"/>

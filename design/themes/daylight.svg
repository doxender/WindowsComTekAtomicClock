<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Daylight — ComTek Atomic Clock theme (high-contrast accessible)</title>
  <defs>
    <radialGradient id="bg-dl" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fffdf5"/>
      <stop offset="100%" stop-color="#fff3d6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg-dl)"/>
  <g transform="translate(200,200)">
    <circle r="172" fill="#ffffff" stroke="#9a9a9a" stroke-width="2"/>
    <circle r="160" fill="#ffffff"/>
    <!-- 60 minute ticks (navy, thin) -->
    <g stroke="#003366" stroke-width="1.2" stroke-linecap="butt">
      <line x1="0" y1="-160" x2="0" y2="-153" transform="rotate(6)"/>
      <line x1="0" y1="-160" x2="0" y2="-153" transform="rotate(12)"/>
      <line x1="0" y1="-160" x2="0" y2="-153" transform="rotate(18)"/>

      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(330)"/>
    </g>
    <!-- All 12 numerals in bold navy sans-serif -->
    <g font-family="'Inter', 'Segoe UI', sans-serif" font-weight="700" font-size="24" fill="#003366" text-anchor="middle">

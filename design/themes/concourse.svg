<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Concourse — ComTek Atomic Clock theme (departure-board styling)</title>
  <defs>
    <radialGradient id="bg-co" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#202020"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg-co)"/>
  <g transform="translate(200,200)">
    <circle r="172" fill="#181818" stroke="#3a3a3a" stroke-width="2"/>
    <circle r="160" fill="#0f0f0f"/>
    <!-- 12 hour ticks (bold orange) -->
    <g stroke="#ff8c00" stroke-width="4" stroke-linecap="square">
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(0)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(30)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(60)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(90)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(120)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(150)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(180)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(210)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(240)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(270)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(300)"/>
      <line x1="0" y1="-160" x2="0" y2="-142" transform="rotate(330)"/>
    </g>
    <!-- All 12 numerals in big bold orange sans-serif -->
    <g font-family="'Bebas Neue', 'DIN Alternate', 'Impact', sans-serif" font-weight="700" font-size="30" fill="#ff8c00" text-anchor="middle">
      <text y="-110">12</text>
      <text x="58" y="-92">1</text>
      <text x="100" y="-50">2</text>
      <text x="116" y="10">3</text>
      <text x="100" y="68">4</text>
      <text x="58" y="108">5</text>
      <text y="124">6</text>
      <text x="-58" y="108">7</text>
      <text x="-100" y="68">8</text>
      <text x="-116" y="10">9</text>
      <text x="-100" y="-50">10</text>
      <text x="-58" y="-92">11</text>
    </g>
    <!-- hour hand: thick orange bar -->
    <rect x="-5" y="-86" width="10" height="106" fill="#ff8c00" rx="1.5" transform="rotate(304.35)"/>
    <!-- minute hand: longer orange bar -->
    <rect x="-4" y="-122" width="8" height="142" fill="#ff8c00" rx="1.5" transform="rotate(52.2)"/>
    <!-- second hand: white sweep -->
    <line x1="0" y1="22" x2="0" y2="-138" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" transform="rotate(252)"/>
    <!-- center pin -->
    <circle r="8" fill="#ff8c00"/>
    <circle r="3" fill="#0f0f0f"/>
    <!-- departure-board digital readout -->
    <rect x="-78" y="38" width="156" height="44" rx="3" fill="#1a0d00" stroke="#ff8c00" stroke-width="0.6"/>
    <text x="0" y="68" text-anchor="middle" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" font-size="26" font-weight="700" fill="#ffa430" letter-spacing="3">10:08:42</text>
  </g>
</svg>

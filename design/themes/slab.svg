<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Slab — ComTek Atomic Clock theme (brutalist concrete digital)</title>
  <defs>
    <linearGradient id="bg-sl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4d0c5"/>
      <stop offset="100%" stop-color="#a8a298"/>
    </linearGradient>
    <pattern id="grit-sl" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="3" fill="transparent"/>
      <circle cx="0.5" cy="0.5" r="0.4" fill="#5a5650" fill-opacity="0.18"/>
      <circle cx="2" cy="1.8" r="0.3" fill="#3a3630" fill-opacity="0.12"/>
    </pattern>
  </defs>
  <!-- concrete background -->
  <rect width="400" height="400" fill="url(#bg-sl)"/>
  <rect width="400" height="400" fill="url(#grit-sl)"/>
  <!-- top accent bar -->
  <rect x="40" y="60" width="320" height="6" fill="#1a1a1a"/>
  <!-- bottom accent bar -->
  <rect x="40" y="338" width="320" height="6" fill="#1a1a1a"/>
  <!-- red diagonal accent -->
  <rect x="40" y="76" width="60" height="3" fill="#cc2a1a"/>
  <!-- date / context label -->
  <text x="40" y="100" font-family="'Roboto Slab', 'Rockwell', 'Times New Roman', serif" font-weight="700" font-size="11" fill="#1a1a1a" letter-spacing="3">ATOMIC · TIME · MDT</text>
  <!-- big slab serif time -->
  <text x="200" y="240" text-anchor="middle" font-family="'Roboto Slab', 'Rockwell', 'Courier New', serif" font-weight="900" font-size="100" fill="#0a0a0a" letter-spacing="-2">10:08</text>
  <!-- seconds -->
  <text x="200" y="290" text-anchor="middle" font-family="'Roboto Slab', 'Rockwell', 'Times New Roman', serif" font-weight="700" font-size="36" fill="#cc2a1a" letter-spacing="4">42″</text>
  <!-- footer label -->
  <text x="200" y="328" text-anchor="middle" font-family="'Roboto Slab', 'Rockwell', 'Times New Roman', serif" font-weight="500" font-size="10" fill="#3a3630" letter-spacing="6">SATURDAY · 25 APRIL 2026</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Atomic Lab — ComTek Atomic Clock theme</title>
  <defs>
    <radialGradient id="bg-al" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
    <linearGradient id="bezel-al" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e3e8"/>
      <stop offset="50%" stop-color="#7c8088"/>
      <stop offset="100%" stop-color="#2c3038"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg-al)"/>
  <g transform="translate(200,200)">
    <circle r="172" fill="url(#bezel-al)"/>
    <circle r="160" fill="#0a1628"/>
    <!-- 60 minute ticks -->
    <g stroke="#ffb000" stroke-width="1" opacity="0.55">
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(6)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(12)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(18)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(24)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(36)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(42)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(48)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(54)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(66)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(72)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(78)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(84)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(96)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(102)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(108)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(114)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(126)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(132)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(138)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(144)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(156)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(162)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(168)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(174)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(186)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(192)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(198)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(204)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(216)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(222)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(228)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(234)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(246)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(252)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(258)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(264)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(276)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(282)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(288)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(294)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(306)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(312)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(318)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(324)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(336)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(342)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(348)"/>
      <line x1="0" y1="-160" x2="0" y2="-155" transform="rotate(354)"/>
    </g>
    <!-- 12 hour ticks -->
    <g stroke="#ffb000" stroke-width="3" stroke-linecap="square">
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(0)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(30)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(60)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(90)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(120)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(150)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(180)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(210)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(240)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(270)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(300)"/>
      <line x1="0" y1="-160" x2="0" y2="-145" transform="rotate(330)"/>
    </g>
    <!-- numerals at 12/3/6/9 -->
    <g font-family="Consolas, 'Courier New', monospace" font-weight="bold" font-size="22" fill="#ffb000" text-anchor="middle">
      <text y="-118">12</text>
      <text x="118" y="8">3</text>
      <text y="128">6</text>
      <text x="-118" y="8">9</text>
    </g>
    <!-- hour hand (10 o'clock-ish) -->
    <line x1="0" y1="14" x2="0" y2="-90" stroke="#f5f5f5" stroke-width="6" stroke-linecap="round" transform="rotate(304.35)"/>
    <!-- minute hand (8 min) -->
    <line x1="0" y1="18" x2="0" y2="-128" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round" transform="rotate(52.2)"/>
    <!-- second hand (42 sec) -->
    <line x1="0" y1="22" x2="0" y2="-142" stroke="#ff3030" stroke-width="1.6" stroke-linecap="round" transform="rotate(252)"/>
    <circle r="7" fill="#ffb000"/>
    <circle r="2.5" fill="#0a1628"/>
    <!-- digital readout panel -->
    <rect x="-66" y="42" width="132" height="44" rx="4" fill="#040b04" stroke="#ffb000" stroke-width="0.6"/>
    <text x="0" y="65" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="20" font-weight="bold" fill="#ffb000" letter-spacing="2">10:08:42</text>
    <text x="0" y="80" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="7" fill="#ffb000" opacity="0.7" letter-spacing="2.5">NIST · BOULDER · CO</text>
  </g>
</svg>

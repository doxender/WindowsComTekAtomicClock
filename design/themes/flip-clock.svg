<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Flip Clock — ComTek Atomic Clock theme (retro Solari-style stacked tiles)</title>
  <defs>
    <linearGradient id="bg-fc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a3d22"/>
      <stop offset="100%" stop-color="#2a1d10"/>
    </linearGradient>
    <linearGradient id="case-fc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="chrome-fc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cccccc"/>
      <stop offset="50%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#444444"/>
    </linearGradient>
    <!-- white card front: subtle vertical gradient so the seam line reads
         as a fold; the lower half is a hair darker so we sense it has
         already flipped once. -->
    <linearGradient id="cardTop-fc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f1e8"/>
    </linearGradient>
    <linearGradient id="cardBot-fc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0ede2"/>
      <stop offset="100%" stop-color="#dcd8ca"/>
    </linearGradient>
    <!-- soft drop shadow under each tile so it sits on the stack -->
    <filter id="cardShadow-fc" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <!-- ONE flip-card glyph as a symbol so the four cards are uniform.
         The symbol has its origin at the top-left of the visible tile;
         the digit is overlaid per instance. Stack-edge marks sit on
         the sides; spindles pierce the hinge axis; a thin sliver below
         hints at the next tile waiting under the visible one. -->
    <symbol id="flipTile" overflow="visible">
      <!-- side stack edges (left), 11 thin lines = the visible page-edges
           of tiles above/below the front one -->
      <g stroke="#9a9489" stroke-width="0.6" stroke-linecap="butt">
        <line x1="-4" y1="14" x2="-1" y2="14"/>
        <line x1="-4" y1="22" x2="-1" y2="22"/>
        <line x1="-4" y1="30" x2="-1" y2="30"/>
        <line x1="-4" y1="40" x2="-1" y2="40"/>
        <line x1="-4" y1="50" x2="-1" y2="50"/>
        <line x1="-4" y1="60" x2="-1" y2="60"/>
        <line x1="-4" y1="78" x2="-1" y2="78"/>
        <line x1="-4" y1="88" x2="-1" y2="88"/>
        <line x1="-4" y1="98" x2="-1" y2="98"/>
        <line x1="-4" y1="108" x2="-1" y2="108"/>
        <line x1="-4" y1="118" x2="-1" y2="118"/>
        <line x1="-4" y1="124" x2="-1" y2="124"/>
      </g>
      <!-- side stack edges (right) -->
      <g stroke="#9a9489" stroke-width="0.6" stroke-linecap="butt">
        <line x1="61" y1="14" x2="64" y2="14"/>
        <line x1="61" y1="22" x2="64" y2="22"/>
        <line x1="61" y1="30" x2="64" y2="30"/>
        <line x1="61" y1="40" x2="64" y2="40"/>
        <line x1="61" y1="50" x2="64" y2="50"/>
        <line x1="61" y1="60" x2="64" y2="60"/>
        <line x1="61" y1="78" x2="64" y2="78"/>
        <line x1="61" y1="88" x2="64" y2="88"/>
        <line x1="61" y1="98" x2="64" y2="98"/>
        <line x1="61" y1="108" x2="64" y2="108"/>
        <line x1="61" y1="118" x2="64" y2="118"/>
        <line x1="61" y1="124" x2="64" y2="124"/>
      </g>
      <!-- a thin "next tile" peek above the front tile (stack going up) -->
      <rect x="3" y="-5" width="54" height="6" rx="1.5" fill="#e8e2d2" opacity="0.7"/>
      <rect x="2" y="-3" width="56" height="4" rx="1.5" fill="#f0ebde"/>
      <!-- and below (the just-flipped tile peeking out from under) -->
      <rect x="2" y="138" width="56" height="5" rx="1.5" fill="#cdc7b6" opacity="0.85"/>
      <!-- the front tile itself, in two halves so the seam is real -->
      <g filter="url(#cardShadow-fc)">
        <rect width="60" height="69" rx="5" ry="3" fill="url(#cardTop-fc)" stroke="#a8a39a" stroke-width="0.5"/>
        <rect y="69" width="60" height="69" rx="5" ry="3" fill="url(#cardBot-fc)" stroke="#a8a39a" stroke-width="0.5"/>
      </g>
      <!-- inner highlight lip on the top edge -->
      <rect x="2" y="1" width="56" height="1.5" fill="#ffffff" opacity="0.9"/>
      <!-- horizontal hinge / fold line through the middle -->
      <line x1="0" y1="69" x2="60" y2="69" stroke="#5a564c" stroke-width="0.7"/>
      <line x1="0" y1="70" x2="60" y2="70" stroke="#ffffff" stroke-width="0.5" opacity="0.7"/>
      <!-- spindle pegs piercing the hinge axis on each side (chrome) -->
      <circle cx="-3" cy="69" r="3.2" fill="url(#chrome-fc)" stroke="#444" stroke-width="0.4"/>
      <circle cx="63" cy="69" r="3.2" fill="url(#chrome-fc)" stroke="#444" stroke-width="0.4"/>
      <circle cx="-3" cy="69" r="1" fill="#222"/>
      <circle cx="63" cy="69" r="1" fill="#222"/>
    </symbol>
  </defs>
  <!-- nightstand surface backdrop -->
  <rect width="400" height="400" fill="url(#bg-fc)"/>
  <!-- subtle wood grain hint -->
  <g opacity="0.12" stroke="#1a0e04" stroke-width="0.5">
    <line x1="0" y1="345" x2="400" y2="345"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
    <line x1="0" y1="375" x2="400" y2="375"/>
    <line x1="0" y1="392" x2="400" y2="392"/>
  </g>
  <!-- chrome legs -->
  <rect x="78" y="316" width="22" height="14" rx="2" fill="url(#chrome-fc)"/>
  <rect x="300" y="316" width="22" height="14" rx="2" fill="url(#chrome-fc)"/>
  <!-- clock case -->
  <rect x="36" y="78" width="328" height="244" rx="14" fill="url(#case-fc)" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- inner display recess (slightly lighter, like the well that holds
       the tile assemblies) -->
  <rect x="50" y="98" width="300" height="186" rx="6" fill="#1c1a16"/>
  <!-- 4 flip tiles - 1, 0, : , 0, 8 -->
  <g transform="translate(64, 122)">
    <use href="#flipTile"/>
    <text x="30" y="103" text-anchor="middle" font-family="'Helvetica Neue', 'Arial Black', 'Segoe UI', sans-serif" font-weight="900" font-size="92" fill="#0a0a0a">1</text>
  </g>
  <g transform="translate(132, 122)">
    <use href="#flipTile"/>
    <text x="30" y="103" text-anchor="middle" font-family="'Helvetica Neue', 'Arial Black', 'Segoe UI', sans-serif" font-weight="900" font-size="92" fill="#0a0a0a">0</text>
  </g>
  <!-- colon between hours and minutes (glowing-amber dots, vintage) -->
  <g fill="#ffb84a">
    <circle cx="200" cy="166" r="3.5"/>
    <circle cx="200" cy="216" r="3.5"/>
  </g>
  <g transform="translate(208, 122)">
    <use href="#flipTile"/>
    <text x="30" y="103" text-anchor="middle" font-family="'Helvetica Neue', 'Arial Black', 'Segoe UI', sans-serif" font-weight="900" font-size="92" fill="#0a0a0a">0</text>
  </g>
  <g transform="translate(276, 122)">
    <use href="#flipTile"/>
    <text x="30" y="103" text-anchor="middle" font-family="'Helvetica Neue', 'Arial Black', 'Segoe UI', sans-serif" font-weight="900" font-size="92" fill="#0a0a0a">8</text>
  </g>
  <!-- seconds indicator + branding (kept from prior design) -->
  <text x="200" y="276" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="10" font-weight="500" fill="#aaa" letter-spacing="3">: 4 2 SECONDS</text>
  <text x="200" y="304" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="9" fill="#888" letter-spacing="4">COMTEK · MODEL CT-1971</text>
</svg>
